<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport"
        content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <title>Jewel</title>
  <meta name="theme-color" content="#15131f" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Jewel" />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="apple-touch-icon" href="icons/icon-180.png" />
  <link rel="icon" href="icons/icon-192.png" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="app">
    <header id="topbar">
      <div class="title-block">
        <span id="level-emoji" class="level-emoji">🍓</span>
        <div class="title-text">
          <div class="app-name">Jewel</div>
          <div id="level-name" class="level-name">Strawberry</div>
        </div>
      </div>
      <div class="topbar-right">
        <canvas id="target-thumb" class="target-thumb" width="44" height="44"></canvas>
        <button id="photo-btn" class="icon-btn" aria-label="Make a puzzle from a photo">📷</button>
        <button id="mute-btn" class="icon-btn" aria-label="Mute">🔊</button>
        <button id="new-btn" class="icon-btn" aria-label="New puzzle">🔀</button>
      </div>
    </header>
    <input id="file-input" type="file" accept="image/*" class="visually-hidden" />

    <div id="progress-bar"><div id="progress-fill"></div><span id="progress-pct">0%</span></div>

    <canvas id="stage"></canvas>

    <div id="win-overlay">
      <div class="win-card">
        <div id="win-emoji" class="win-emoji">🍓</div>
        <div class="win-title">Complete!</div>
        <div id="win-name" class="win-name">Strawberry</div>
        <button id="again-btn" class="primary-btn">Next puzzle →</button>
      </div>
    </div>
  </div>

  <script src="js/color.js"></script>
  <script src="js/pixelize.js"></script>
  <script src="js/art.js"></script>
  <script src="js/game.js"></script>
  <script src="js/audio.js"></script>
  <script src="js/render.js"></script>
  <script src="js/main.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => navigator.serviceWorker.register('sw.js').catch(() => {}));
    }
  </script>
</body>
</html>
